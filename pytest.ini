[pytest]
testpaths       = tests
asyncio_mode    = auto
log_cli         = true
log_cli_level   = INFO
log_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
addopts         =
    --tb=short
    --strict-markers
    -v
markers =
    unit:        Tests unitaires (pas de services externes)
    integration: Tests nécessitant IPFS + Ganache démarrés
    api:         Tests des routes FastAPI
    slow:        Tests longs (> 5s)