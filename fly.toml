# fly.toml — Configuration Fly.io pour MusicGuard Backend
# Fichier à placer à la RACINE du projet (pas dans backend/)

app            = "musicguard-backend"
primary_region = "cdg"        # Paris — le plus proche de Cotonou

[build]
  dockerfile = "Dockerfile"   # Dockerfile à la racine du projet

[env]
  PORT        = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true   # économise les ressources gratuites
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "2gb"     # torch + modèle nécessitent au moins 1.5 Go
  cpu_kind = "shared"
  cpus     = 1

# Pas de volume persistant nécessaire (modèle dans l'image Docker)